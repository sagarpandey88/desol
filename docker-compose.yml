version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: desol-postgres
    environment:
      POSTGRES_USER: desol
      POSTGRES_PASSWORD: desol_secret
      POSTGRES_DB: desol_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U desol -d desol_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
